name: Release

on:
  push:
    tags: ['v*']

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Package
        run: tar -czf kin-app.tar.gz dist/ dist-server/ package.json package-lock.json

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: kin-app.tar.gz
          generate_release_notes: true
